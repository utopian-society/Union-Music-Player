name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - release
          - debug
        default: 'release'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Use JDK 25 for the entire workflow
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install required SDK components
      run: |
        sdkmanager --install "platforms;android-35" \
          "build-tools;35.0.0" \
          "platform-tools" \
          "cmdline-tools;latest" \
          "ndk;26.1.10909125" \
          "cmake;3.22.1"
        yes | sdkmanager --licenses

    - name: Install native build tools for FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool make nasm pkg-config yasm

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    # ==================== Build Media3 FFmpeg Extension ====================
    - name: Build Media3 FFmpeg decoder from source and publish to Maven Local
      env:
        MEDIA3_VERSION: '1.9.2'
        NDK_VERSION: '26.1.10909125'
      run: |
        rm -rf media3 || true

        # Shallow clone for speed
        git clone --depth 1 --branch ${MEDIA3_VERSION} https://github.com/androidx/media.git media3
        cd media3

        chmod +x ./gradlew

        # Force Gradle 9.4.1 + JDK 25 compatibility
        sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-all.zip|' gradle/wrapper/gradle-wrapper.properties

        export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
        export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"

        ./gradlew --stop || true

        echo "Building native FFmpeg libraries (ALAC + AAC + FLAC + MP3 + WAV support)..."

        # === Build native FFmpeg first (most important step) ===
        FFMPEG_MODULE_PATH="$(pwd)/libraries/decoder_ffmpeg/src/main"
        HOST_PLATFORM="linux-x86_64"
        ANDROID_ABI="21"   # Change to your minSdk if higher

        # Decoders needed for your formats:
        # - alac     → ALAC (Apple Lossless)
        # - aac      → AAC (including in M4A)
        # - flac     → FLAC
        # - mp3      → MP3
        # - pcm_*    → WAV (PCM)
        ENABLED_DECODERS=(alac aac flac mp3 pcm_mulaw pcm_alaw)

        cd "${FFMPEG_MODULE_PATH}/jni"

        # Run the official build script
        ./build_ffmpeg.sh \
          "${FFMPEG_MODULE_PATH}" \
          "${ANDROID_NDK_HOME}" \
          "${HOST_PLATFORM}" \
          "${ANDROID_ABI}" \
          "${ENABLED_DECODERS[@]}"

        echo "Native FFmpeg build completed. Now building the Android library..."

        # Go back to media3 root and build + publish the AAR
        cd /home/runner/work/Union-Music-Player/Union-Music-Player/media3

        ./gradlew :libraries:decoder_ffmpeg:publishToMavenLocal \
          --no-daemon \
          --stacktrace \
          -Pandroid.ndkPath="${ANDROID_NDK_HOME}" \
          --max-workers=2

        cd ..
    # =====================================================================

    - name: Update version in build.gradle.kts
      run: |
        sed -i "s/versionCode[[:space:]]*=[[:space:]]*[0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
        sed -i "s/versionName[[:space:]]*=[[:space:]]*\"[^\"]*\"/versionName = \"${{ inputs.version }}\"/" app/build.gradle.kts

    - name: Decode & place keystore
      if: ${{ inputs.build_type == 'release' }}
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.p12

    - name: Build Release APK
      if: ${{ inputs.build_type == 'release' }}
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Build Debug APK
      if: ${{ inputs.build_type == 'debug' }}
      run: ./gradlew assembleDebug --no-daemon

    # ... (rest of your steps: Prepare artifact, Generate release notes, Create GitHub Release, Upload artifact) remain unchanged
    - name: Prepare release artifact (Release)
      if: ${{ inputs.build_type == 'release' }}
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/app-release.apk release/UnionMusicPlayer-v${{ inputs.version }}-release.apk

    - name: Prepare release artifact (Debug)
      if: ${{ inputs.build_type == 'debug' }}
      run: |
        mkdir -p debug
        cp app/build/outputs/apk/debug/app-debug.apk debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk

    - name: Generate release notes
      if: ${{ inputs.build_type == 'release' }}
      id: release_notes
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        TAG_NAME="v${{ inputs.version }}"

        # Generate release notes using GitHub API
        RELEASE_NOTES=$(gh api -X POST /repos/${{ github.repository }}/releases/generate-notes \
          -f tag_name="$TAG_NAME" \
          -f previous_tag_name="" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          --jq '.body')

        # Save to file for multiline string handling
        echo "$RELEASE_NOTES" > release_notes.md
        echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: ${{ inputs.build_type == 'release' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_notes.outputs.tag_name }}
        name: Union Music Player ${{ steps.release_notes.outputs.tag_name }}
        body_path: release_notes.md
        files: |
          release/UnionMusicPlayer-v${{ inputs.version }}-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Upload Debug APK as artifact
      if: ${{ inputs.build_type == 'debug' }}
      uses: actions/upload-artifact@v4
      with:
        name: UnionMusicPlayer-v${{ inputs.version }}-debug
        path: debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk
        retention-days: 30
