name: Build & Release Signed APK

on:
  push:
    branches: [ main ] # ← change to 'master', 'develop' etc. if needed

jobs:
  build:
    runs-on: ubuntu-latest # GitHub-hosted runner (Android SDK pre-installed on ubuntu-latest in 2024–2026)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Needed if you want git-based versioning later

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    # ────────────────────────────────────────────────────────────────
    # Android SDK setup – most reliable & maintained in 2025–2026
    # Installs cmdline-tools, accepts licenses, adds to PATH
    # ────────────────────────────────────────────────────────────────
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3 # v3 is latest stable as of late 2024 / 2025–2026

    - name: Install required SDK components (compileSdk 35)
      run: |
        sdkmanager --install "platforms;android-35" \
        "build-tools;35.0.0" \
        "platform-tools" \
        "cmdline-tools;latest"
        # Accept licenses if any pending (usually handled by setup-android action)
        yes | sdkmanager --licenses

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    # ────────────────────────────────────────────────────────────────
    # Optional: Auto-increment versionCode & versionName
    # Uses a popular, simple action (you can remove if you prefer manual versioning)
    # ────────────────────────────────────────────────────────────────
    - name: Bump version automatically
      uses: chkfung/android-version-actions@v1.2.2
      with:
        gradlePath: app/build.gradle.kts
        versionCode: ${{ github.run_number }}
        versionName: "1.0.${{ github.run_number }}" # Customize pattern: "v${{ github.run_number }}", "1.0-rc.${{ github.run_number }}", etc.

    # ────────────────────────────────────────────────────────────────
    # Decode base64 keystore from secret → file in workspace
    # PKCS12 format is the default for Java 17+ and is more secure
    # ────────────────────────────────────────────────────────────────
    - name: Decode & place keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.p12

    # ────────────────────────────────────────────────────────────────
    # Build signed release APK
    # Your build.gradle.kts reads env vars → signing works automatically
    # ────────────────────────────────────────────────────────────────
    - name: Build signed Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    # ────────────────────────────────────────────────────────────────
    # Upload the final signed APK as downloadable artifact
    # Appears in Actions → Summary → Artifacts
    # ────────────────────────────────────────────────────────────────
    - name: Upload signed APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.run_number }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 7 # optional: keep artifacts for 7 days
