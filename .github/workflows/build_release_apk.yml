name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - release
          - debug
        default: 'release'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install required SDK components
      run: |
        sdkmanager --install "platforms;android-34" \
          "build-tools;34.0.0" \
          "platform-tools" \
          "cmdline-tools;latest"
        yes | sdkmanager --licenses

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Validate Gradle wrapper
      run: ./gradlew --version

    - name: Update version in build.gradle.kts
      run: |
        sed -i "s/versionCode[[:space:]]*=[[:space:]]*[0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
        sed -i "s/versionName[[:space:]]*=[[:space:]]*\"[^\"]*\"/versionName = \"${{ inputs.version }}\"/" app/build.gradle.kts

    - name: Decode & place keystore
      if: ${{ inputs.build_type == 'release' }}
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.p12

    - name: Build Release APK
      if: ${{ inputs.build_type == 'release' }}
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Build Debug APK
      if: ${{ inputs.build_type == 'debug' }}
      run: ./gradlew assembleDebug --no-daemon

    - name: Prepare release artifact (Release)
      if: ${{ inputs.build_type == 'release' }}
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/app-release.apk release/UnionMusicPlayer-v${{ inputs.version }}-release.apk

    - name: Prepare release artifact (Debug)
      if: ${{ inputs.build_type == 'debug' }}
      run: |
        mkdir -p debug
        cp app/build/outputs/apk/debug/app-debug.apk debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk

    # Changelog + GitHub Release steps
    - name: Prepare changelog for release
      if: ${{ inputs.build_type == 'release' }}
      id: release_meta
      run: |
        TAG_NAME="v${{ inputs.version }}"
        if [ ! -f changelog.md ]; then
          echo "ERROR: changelog.md not found at repository root."
          exit 1
        fi
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "changelog_file=changelog.md" >> $GITHUB_OUTPUT
        echo "=== Changelog ==="
        cat changelog.md

    - name: Create GitHub Release
      if: ${{ inputs.build_type == 'release' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        name: Union Music Player ${{ steps.release_meta.outputs.tag_name }}
        body_path: ${{ steps.release_meta.outputs.changelog_file }}
        files: |
          release/UnionMusicPlayer-v${{ inputs.version }}-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Upload Debug APK as artifact
      if: ${{ inputs.build_type == 'debug' }}
      uses: actions/upload-artifact@v4
      with:
        name: UnionMusicPlayer-v${{ inputs.version }}-debug
        path: debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk
        retention-days: 30