name: Build & Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install required SDK components (compileSdk 35)
      run: |
        sdkmanager --install "platforms;android-35" \
        "build-tools;35.0.0" \
        "platform-tools" \
        "cmdline-tools;latest"
        yes | sdkmanager --licenses

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Decode & place keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.p12

    - name: Build signed Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle.kts | sed 's/.*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/')
        VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | sed 's/.*versionCode[[:space:]]*=[[:space:]]*\([^,]*\).*/\1/')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "tag_name=v$VERSION_NAME-build${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Union Music Player ${{ steps.version.outputs.tag_name }}
        body: |
          ## Union Music Player ${{ steps.version.outputs.tag_name }}
          
          **版本**: ${{ steps.version.outputs.version_name }}
          **建置編號**: ${{ github.run_number }}
          **建置日期**: ${{ github.event.repository.updated_at }}
          
          ### 變更內容
          - 請查看 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.sha }})
          
          ### 下載
          - 下載下方的 APK 檔案進行安裝
        files: |
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
