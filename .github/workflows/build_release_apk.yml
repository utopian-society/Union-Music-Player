name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - release
          - debug
        default: 'release'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install required SDK components (compileSdk 35 + NDK)
      run: |
        sdkmanager --install "platforms;android-35" \
        "build-tools;35.0.0" \
        "platform-tools" \
        "cmdline-tools;latest" \
        "ndk;26.1.10909125" \
        "cmake;3.22.1"
        yes | sdkmanager --licenses

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Media3 FFmpeg extension and publish to Maven Local
      env:
        MEDIA3_VERSION: '1.2.1'
        NDK_VERSION: '26.1.10909125'
      run: |
        git clone https://github.com/androidx/media.git media3
        cd media3
        git fetch --tags
        git checkout "androidx-media3-${MEDIA3_VERSION}" || git checkout "${MEDIA3_VERSION}"
        export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}"
        export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
        ./gradlew :libraries:exoplayer_ffmpeg:publishToMavenLocal --no-daemon
        cd ..

    - name: Update version in build.gradle.kts
      run: |
        sed -i "s/versionCode[[:space:]]*=[[:space:]]*[0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
        sed -i "s/versionName[[:space:]]*=[[:space:]]*\"[^\"]*\"/versionName = \"${{ inputs.version }}\"/" app/build.gradle.kts

    - name: Decode & place keystore
      if: ${{ inputs.build_type == 'release' }}
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.p12

    - name: Build Release APK
      if: ${{ inputs.build_type == 'release' }}
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Build Debug APK
      if: ${{ inputs.build_type == 'debug' }}
      run: ./gradlew assembleDebug

    - name: Prepare release artifact (Release)
      if: ${{ inputs.build_type == 'release' }}
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/app-release.apk release/UnionMusicPlayer-v${{ inputs.version }}-release.apk

    - name: Prepare release artifact (Debug)
      if: ${{ inputs.build_type == 'debug' }}
      run: |
        mkdir -p debug
        cp app/build/outputs/apk/debug/app-debug.apk debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk

    - name: Generate release notes
      if: ${{ inputs.build_type == 'release' }}
      id: release_notes
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        TAG_NAME="v${{ inputs.version }}"

        # Generate release notes using GitHub API
        RELEASE_NOTES=$(gh api -X POST /repos/${{ github.repository }}/releases/generate-notes \
          -f tag_name="$TAG_NAME" \
          -f previous_tag_name="" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          --jq '.body')

        # Save to file for multiline string handling
        echo "$RELEASE_NOTES" > release_notes.md
        echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: ${{ inputs.build_type == 'release' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_notes.outputs.tag_name }}
        name: Union Music Player ${{ steps.release_notes.outputs.tag_name }}
        body_path: release_notes.md
        files: |
          release/UnionMusicPlayer-v${{ inputs.version }}-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Upload Debug APK as artifact
      if: ${{ inputs.build_type == 'debug' }}
      uses: actions/upload-artifact@v4
      with:
        name: UnionMusicPlayer-v${{ inputs.version }}-debug
        path: debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk
        retention-days: 30
