name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - release
          - debug
        default: 'release'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install required SDK components
      run: |
        sdkmanager --install "platforms;android-36" \
          "build-tools;36.0.0" \
          "platform-tools" \
          "cmdline-tools;latest"
        yes | sdkmanager --licenses

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Validate Gradle wrapper
      run: |
        echo "=== Checking Gradle Wrapper Files ==="
        ls -la gradle/wrapper/
        echo "=== Gradle Wrapper Properties ==="
        cat gradle/wrapper/gradle-wrapper.properties
        echo "=== Running Gradle Version ==="
        ./gradlew --version

    - name: Update version in build.gradle.kts
      run: |
        sed -i "s/versionCode[[:space:]]*=[[:space:]]*[0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
        sed -i "s/versionName[[:space:]]*=[[:space:]]*\"[^\"]*\"/versionName = \"${{ inputs.version }}\"/" app/build.gradle.kts

    - name: Decode & place keystore
      if: ${{ inputs.build_type == 'release' }}
      run: |
        echo "=== Decoding Keystore ==="
        if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
          echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set!"
          exit 1
        fi
        echo "Keystore base64 length: ${#ANDROID_KEYSTORE_BASE64}"
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.p12
        if [ -f "${{ github.workspace }}/release-keystore.p12" ]; then
          echo "Keystore file created successfully"
          ls -lh ${{ github.workspace }}/release-keystore.p12
        else
          echo "ERROR: Failed to create keystore file"
          exit 1
        fi
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    - name: Setup signing properties for release
      if: ${{ inputs.build_type == 'release' }}
      run: |
        echo "release.storeFile=${{ github.workspace }}/release-keystore.p12" >> gradle.properties
        echo "release.storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
        echo "release.keyAlias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
        echo "release.keyPassword=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

    - name: Build Release APK
      if: ${{ inputs.build_type == 'release' }}
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.p12
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        echo "=== Signing Configuration ==="
        echo "KEYSTORE_PATH: $KEYSTORE_PATH"
        echo "KEYSTORE_PASSWORD: [REDACTED]"
        echo "KEY_ALIAS: $KEY_ALIAS"
        echo "KEY_PASSWORD: [REDACTED]"
        echo ""
        echo "Keystore file exists: $([ -f "$KEYSTORE_PATH" ] && echo 'YES' || echo 'NO')"
        echo ""
        echo "=== Building Release APK ==="
        ./gradlew assembleRelease --no-daemon --stacktrace
        echo ""
        echo "=== APK Output ==="
        find app/build/outputs/apk -name "*.apk" -type f

    - name: Build Debug APK
      if: ${{ inputs.build_type == 'debug' }}
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace
        echo "=== APK Output ==="
        find app/build/outputs/apk -name "*.apk" -type f

    - name: Prepare release artifact (Release)
      if: ${{ inputs.build_type == 'release' }}
      run: |
        echo "=== Searching for Release APK ==="
        find app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        APK_PATH=$(find app/build/outputs/apk/release -name "*release*.apk" -type f 2>/dev/null | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: Release APK not found. Listing all APKs:"
          find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APKs in outputs"
          exit 1
        fi
        echo "Found APK: $APK_PATH"
        mkdir -p release
        cp "$APK_PATH" release/UnionMusicPlayer-v${{ inputs.version }}-release.apk
        ls -lh release/

    - name: Prepare release artifact (Debug)
      if: ${{ inputs.build_type == 'debug' }}
      run: |
        mkdir -p debug
        cp app/build/outputs/apk/debug/app-debug.apk debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk

    # Changelog + GitHub Release steps
    - name: Prepare changelog for release
      if: ${{ inputs.build_type == 'release' }}
      id: release_meta
      run: |
        TAG_NAME="v${{ inputs.version }}"
        if [ ! -f changelog.md ]; then
          echo "ERROR: changelog.md not found at repository root."
          exit 1
        fi
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "changelog_file=changelog.md" >> $GITHUB_OUTPUT
        echo "=== Changelog ==="
        cat changelog.md

    - name: Create GitHub Release
      if: ${{ inputs.build_type == 'release' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        name: Union Music Player ${{ steps.release_meta.outputs.tag_name }}
        body_path: ${{ steps.release_meta.outputs.changelog_file }}
        files: |
          release/UnionMusicPlayer-v${{ inputs.version }}-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Upload Debug APK as artifact
      if: ${{ inputs.build_type == 'debug' }}
      uses: actions/upload-artifact@v4
      with:
        name: UnionMusicPlayer-v${{ inputs.version }}-debug
        path: debug/UnionMusicPlayer-v${{ inputs.version }}-debug.apk
        retention-days: 30